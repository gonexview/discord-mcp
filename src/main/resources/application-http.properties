spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

spring.main.web-application-type=servlet

management.endpoints.web.exposure.include=health

# OAuth 2.0 Client Credentials (used by Claude Teams Custom Connector)
discord.mcp.oauth.client-id=${DISCORD_MCP_OAUTH_CLIENT_ID:}
discord.mcp.oauth.client-secret=${DISCORD_MCP_OAUTH_CLIENT_SECRET:}

# Tool allowlist (comma-separated tool names). Empty = all tools exposed.
discord.mcp.tools.enabled=get_server_info,list_channels,find_channel,get_channel_info,\
  list_roles,list_active_threads,read_messages,send_message,edit_message,\
  add_reaction,remove_reaction,list_emojis,list_channels_in_category,\
  find_category,get_attachment,list_guild_scheduled_events
